name: Finalize (Draft)

on:
  schedule:
    # 北京时间 09:00 晨报 → UTC 01:00(汇总昨天完整一天)。
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  finalize:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      MODELSCOPE_API_KEY: ${{ secrets.MODELSCOPE_API_KEY }}
      AGNES_API_KEY: ${{ secrets.AGNES_API_KEY }}
      DECISIONS_API_SECRET: ${{ secrets.DECISIONS_API_SECRET }}
    steps:
      # 用 PAT checkout: 使后续 content push 触发 pages.yml(默认 GITHUB_TOKEN 防递归不触发)
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAGES_PUSH_TOKEN }}
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv sync

      # ADR 0004: state.db 不进 git,用 cache 跨 run 滚动持久化
      - name: Restore/save state.db
        uses: actions/cache@v4
        with:
          path: data/state.db
          key: state-db-${{ github.run_id }}
          restore-keys: state-db-

      - name: Run finalize tick (writes content/posts/<date>.md, draft:true)
        run: uv run python -m src.cli --tick finalize

      - name: Run metrics tick (writes content/metrics/<date>.{json,png,md}, TG photo)
        continue-on-error: true
        run: uv run python -m src.cli --tick metrics

      - name: Commit draft
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/
          git diff --cached --quiet || git commit -m "chore: finalize draft + metrics $(date -u +%Y-%m-%d)"
          git push
