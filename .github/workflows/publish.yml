name: Publish

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv sync

      - name: Promote draft to published
        run: |
          DATE=$(date -u +%Y-%m-%d)
          DRAFT="docs/daily/${DATE}-draft.md"
          PUBLISHED="docs/daily/${DATE}.md"
          if [ -f "$DRAFT" ]; then
            mv "$DRAFT" "$PUBLISHED"
          fi

      - name: Send Telegram final report
        run: uv run python -m src.cli --tick finalize --publish-only 2>/dev/null || true

      - name: Generate RSS feed
        run: uv run python -m src.tools.generate_rss 2>/dev/null || true

      - name: Commit published content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ data/
          git diff --cached --quiet || git commit -m "publish: daily report $(date -u +%Y-%m-%d)"
          git push

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        with:
          path: docs/
