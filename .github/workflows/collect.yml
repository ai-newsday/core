name: Collect

on:
  schedule:
    # 东八区 08:00 / 13:00 / 20:00 → UTC 00:00 / 05:00 / 12:00
    - cron: "0 0,5,12 * * *"
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      MODELSCOPE_API_KEY: ${{ secrets.MODELSCOPE_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv sync

      # ADR 0004: state.db 不进 git,用 cache 跨 run 滚动持久化
      - name: Restore/save state.db
        uses: actions/cache@v4
        with:
          path: data/state.db
          key: state-db-${{ github.run_id }}
          restore-keys: state-db-

      - name: Run collect tick
        run: uv run python -m src.cli --tick collect
