telegram:
  bot_token: ""         # 通过 TELEGRAM_BOT_TOKEN 环境变量注入, 不要写死在这里
  chat_id: ""           # 通过 TELEGRAM_CHAT_ID 环境变量注入
  mode: "webhook"       # 已切 webhook(CF Worker); 决策经 webhook 异步收集

website:
  enabled: true
  output_dir: "content/posts"
  git_push: false
  site_base_url: "https://ai-newsday.github.io/core/"

decisions_api:
  url: "https://ai-newsday-telegram-webhook.ai-newwsday.workers.dev"  # CF Worker 基址
  # secret 通过 DECISIONS_API_SECRET 环境变量注入, 不要写死
