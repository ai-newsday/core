# 打分排序层配置 (Circle 3). 全部维度分/权重/配额可调, 不写死在代码里.
# genre → 4 维内容价值 (一手性/技术价值/产业影响/扩散潜力). 机构影响力由 publisher 提供.
genre_value:
  paper:        {一手性: 20, 技术价值: 16, 产业影响: 8,  扩散潜力: 7}
  model:        {一手性: 18, 技术价值: 14, 产业影响: 12, 扩散潜力: 9}
  announcement: {一手性: 20, 技术价值: 10, 产业影响: 16, 扩散潜力: 12}
  writeup:      {一手性: 12, 技术价值: 12, 产业影响: 8,  扩散潜力: 9}
  news:         {一手性: 8,  技术价值: 6,  产业影响: 12, 扩散潜力: 11}

# publisher → 机构影响力 (单标量, b1). priority_bonus 仍叠加其上.
publisher_authority: {lab: 18, company: 14, individual: 8, media: 12}

# registry 中 source.priority (1=最高) → 折进"机构影响力"维度
priority_bonus: {1: 6, 2: 3, 3: 0, 4: -2, 5: -4}
priority_bonus_default: 0

recency:                          # 时效分 (spec §5.2). 晨报报昨天: 放宽让昨天一整天算新鲜, 按质量排而非按几点发
  fresh_hours: 30
  fresh_bonus: 10
  mid_hours: 48
  mid_bonus: 4
  stale_hours: 60
  stale_penalty: -10

# 读者偏好话题: 标题/摘要命中关键词 → 读者相关度 bonus
topic_boost:
  keywords:
    - unified generation
    - image editing
    - multimodal
    - agent
    - image generation
    - video generation
    - diffusion
    - vision-language
    - 统一生成
    - 图像编辑
    - 多模态
    - 智能体
  bonus: 5

penalty:
  same_source: -5                 # 同源第2+条各扣 (spec §5.3)
  firehose: -20                   # 信号闸: 个人+零人气的 model/writeup 扣分(压 gemma 类噪声)

# "可见指标" = sum(weight * sqrt(signals[key]))  → cap (spec §5.1 PRD §5.5 该维度的接入)
# - hf-papers.upvotes 范围常见 0-300 → sqrt 后 0-17, 大头都在 5-12
# - hf-models.likes 范围 0-1000+ → sqrt 后 0-30, 极值有但少
# - hn_points 范围 0-1000+ → sqrt 后 0-30, AI 圈中位数 5-50
# - 权重 0.5 让 sqrt(100)=10 → 5 分, sqrt(900)=30 → 15 (近 cap)
popularity_weights: {upvotes: 0.6, hn_points: 0.5, likes: 0.3, num_comments: 0.4}
popularity_cap: 15.0              # 单条最高 +15 分, 防异常超大数值

# genre 配额上限 (PRD §4.2). 各 quota 是 per-genre 上限, 和可 > total_limit;
# 最终由 total_limit + publish min_display_score(60 地板) 截。商用模型/大厂更新坑位拉高。
quota: {paper: 3, model: 3, announcement: 3, writeup: 2, news: 1}
total_limit: 11

sources_registry_path: "config/sources.yaml"
