# X (Twitter) 候选账号清单 — 本地配置/预览用, 尚未建 X List, 尚未激活。
#
# 5 个分类对应 5 个 X List, 建完后把拿到的 list_id 填回
# config/sources.d/x.yaml 的 xlist:TBD, status 从 manual 改 working。
#
# 核实纪律(对齐本仓库 CLAUDE.md "宁可少写不可编造"): 每个 handle 都用 WebSearch
# 核实过真实存在, 搜不到官方账号的宁可跳过(如 ByteDance Seed 团队), 不猜。
# 明确排除: 国内自媒体/新闻聚合号(量子位/机器之心等) — 用户 2026-07-16 确认不要,
# 只要一手账号(机构官方号 + 个人号)。
#
# 分类逻辑(2026-07-16 定稿, 用户要求把原 lab 拆细):
#   ai-lab      纯科研机构 — 学术/非营利/大厂研究院, 不直接卖产品
#   ai-company  大厂/独角兽官方号 — 商业化 + 前沿模型并重
#   ai-product  具体产品/工具账号 — 应用层, 不一定是原创大模型研究
#   researcher  个人研究者/科学家 — 从原 kol 拆出来独立成类
#   kol         其余个人号 — 创始人高管 / 产品负责人 / 行业观察爆料 / 中文圈
#
# 日期: 2026-07-16

