# X (Twitter) 账号清单 — 本地配置/预览用。
#
# ai-lab / ai-company 两个 X List 已建好并激活(见 config/sources.d/x.yaml 的
# list_id + status: working)。ai-product / researcher / kol 三个还是候选,
# 待建 X List。
#
# 核实纪律(对齐本仓库 CLAUDE.md "宁可少写不可编造"): 每个 handle 都用 WebSearch
# 核实过真实存在, 搜不到官方账号的宁可跳过, 不猜。
# 明确排除: 国内自媒体/新闻聚合号(量子位/机器之心等) — 用户 2026-07-16 确认不要,
# 只要一手账号(机构官方号 + 个人号)。
#
# 分类逻辑(2026-07-16 定稿, 几轮用户纠正后的最终版):
#   ai-lab      纯科研机构 — 学术/非营利/大厂研究院, 不直接卖产品
#   ai-company  公司官方号 — 前沿模型厂商 / 工具厂商, 含"公司=产品"高度绑定的情况
#               (Suno、RunwayML、StabilityAI 这类公司本体就是产品, 不算 ai-product)
#   ai-product  从大母品牌里独立拆出来的具体产品/开发者关系/公关子账号
#               (如 GeminiApp/NotebookLM 之于 Google, claudeai/ClaudeDevs 之于 Anthropic)
#   researcher  个人研究者/科学家
#   kol         其余个人号 — 创始人高管 / 产品负责人 / 行业观察爆料 / 中文圈
#
# ai-company 由用户自行维护候选(账号量大、变动快), 本文件不再列出/同步候选,
# 只记 list_id, 见 config/sources.d/x.yaml。
#
# 日期: 2026-07-16

